name: CI

'on':
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

jobs:
  build-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CARGO_TERM_COLOR: always
      BUILD_PROFILE: debug
      WHITAKER_INSTALLER_VERSION: '0.2.5'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0
      - name: Setup Rust
        uses: leynos/shared-actions/.github/actions/setup-rust@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
      - name: Format
        run: make check-fmt
      - name: Spelling
        run: make spelling
      - name: Markdown lint
        uses: DavidAnson/markdownlint-cli2-action@8de2aa07cae85fd17c0b35642db70cf5495f1d25
        with:
          globs: |
            **/*.md
            !**/target/**
            !**/dist/**
      - name: Cache Whitaker installer
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
        with:
          path: |
            ~/.cargo/bin/whitaker-installer
            ~/.cache/cargo-binstall
          key: whitaker-installer-${{ runner.os }}-${{ runner.arch }}-${{ env.WHITAKER_INSTALLER_VERSION }}
      - name: Install Whitaker Dylint suite
        run: |
          if ! command -v whitaker-installer >/dev/null 2>&1; then
            if cargo binstall --version >/dev/null 2>&1; then
              cargo binstall --no-confirm --locked "whitaker-installer@${WHITAKER_INSTALLER_VERSION}"
            else
              echo "cargo-binstall unavailable; building whitaker-installer from crates.io"
              cargo install --locked whitaker-installer --version "${WHITAKER_INSTALLER_VERSION}"
            fi
          fi
          whitaker-installer
      - name: Lint
        run: make lint
      - name: Setup uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          python-version: '3.13'
          enable-cache: true
      - name: Workflow contract tests
        run: make test-workflow-contracts
      - name: Test and Measure Coverage
        uses: leynos/shared-actions/.github/actions/generate-coverage@927edd45ae77be4251a8a18ca9eb5613a2e32cbd
        with:
          output-path: lcov.info
          format: lcov
          use-cargo-nextest: 'false'
          with-ratchet: 'true'
      - name: Check coverage against CodeScene gates
        env:
          CS_ACCESS_TOKEN: ${{ secrets.CS_ACCESS_TOKEN }}
        if: env.CS_ACCESS_TOKEN != '' && github.event_name == 'pull_request'
        uses: leynos/shared-actions/.github/actions/upload-codescene-coverage@3c1fa01bcf4c26dac79975c18b74c01d577dcf95
        with:
          format: lcov
          mode: check
          project-url: https://api.codescene.io/v2/projects/74420
          access-token: ${{ env.CS_ACCESS_TOKEN }}
          installer-checksum: ${{ vars.CODESCENE_CLI_SHA256 }}
